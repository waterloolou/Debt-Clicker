name: Build & Release

on:
  push:
    tags:
      - "v*"          # trigger on v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # also allow manual runs from the Actions tab

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python -m PyInstaller debt_clicker.spec

      - name: Zip the output folder
        run: |
          Compress-Archive -Path dist\DebtClicker\* -DestinationPath dist\DebtClicker-Windows.zip
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebtClicker-Windows
          path: dist/DebtClicker-Windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DebtClicker-Windows.zip
          body: |
            ## Debt Clicker ${{ github.ref_name }}

            ### Download
            Download **DebtClicker-Windows.zip**, extract it anywhere, and run **DebtClicker.exe**.

            No Python installation required.

            ---
            ### What's new
            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full feature list.
