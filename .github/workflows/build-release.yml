name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: DebtClicker-Windows.zip
          - os: ubuntu-latest
            artifact: DebtClicker-Linux.tar.gz
          - os: macos-latest
            artifact: DebtClicker-macOS.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk libgdal-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python -m PyInstaller debt_clicker.spec --noconfirm

      - name: Compress output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\DebtClicker\* -DestinationPath dist\DebtClicker-Windows.zip -Force

      - name: Compress output (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x dist/DebtClicker/DebtClicker
          tar -czf dist/DebtClicker-Linux.tar.gz -C dist DebtClicker

      - name: Compress output (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x dist/DebtClicker/DebtClicker
          cd dist && zip -r DebtClicker-macOS.zip DebtClicker/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## Debt Clicker ${{ github.ref_name }}

            ### Download for your platform

            | Platform | Download |
            |----------|----------|
            | Windows  | `DebtClicker-Windows.zip` |
            | Linux    | `DebtClicker-Linux.tar.gz` |
            | macOS    | `DebtClicker-macOS.zip` |

            **No Python installation required.**

            ### Windows
            Extract the zip and run **DebtClicker.exe**.

            ### Linux
            ```bash
            tar -xzf DebtClicker-Linux.tar.gz
            ./DebtClicker/DebtClicker
            ```

            ### macOS
            Extract the zip and run **DebtClicker** (right-click → Open the first time to bypass Gatekeeper).
